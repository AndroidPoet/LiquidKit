name: LiquidKitSample
options:
  bundleIdPrefix: io.github.androidpoet
  deploymentTarget:
    iOS: "17.2"
settings:
  base:
    DEVELOPMENT_TEAM: ""
    LD_RUNPATH_SEARCH_PATHS:
      - "$(inherited)"
      - "@executable_path/Frameworks"
targets:
  LiquidKitSampleIOS:
    type: application
    platform: iOS
    sources:
      - LiquidKitSample
    dependencies:
      - framework: ../sampleApp/build/XCFrameworks/debug/LiquidKitSample.xcframework
        embed: false
    preBuildScripts:
      - name: Build Kotlin XCFramework
        basedOnDependencyAnalysis: false
        script: |
          cd "$SRCROOT/.."
          gradle :sampleApp:linkDebugFrameworkIosArm64 :sampleApp:linkDebugFrameworkIosSimulatorArm64
          rm -rf sampleApp/build/XCFrameworks/debug/LiquidKitSample.xcframework
          mkdir -p sampleApp/build/XCFrameworks/debug
          xcodebuild -create-xcframework \
            -framework sampleApp/build/bin/iosArm64/debugFramework/LiquidKitSample.framework \
            -framework sampleApp/build/bin/iosSimulatorArm64/debugFramework/LiquidKitSample.framework \
            -output sampleApp/build/XCFrameworks/debug/LiquidKitSample.xcframework
    settings:
      base:
        PRODUCT_NAME: LiquidKitSampleIOS
        PRODUCT_MODULE_NAME: LiquidKitSampleIOS
        PRODUCT_BUNDLE_IDENTIFIER: io.github.androidpoet.LiquidKitSample
        INFOPLIST_FILE: LiquidKitSample/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1,2"
        SWIFT_VERSION: "6.0"
        SWIFT_ENABLE_EXPLICIT_MODULES: "NO"
        "EXCLUDED_ARCHS[sdk=iphonesimulator*]": "x86_64"
