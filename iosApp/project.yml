name: LiquidKitSample
options:
  bundleIdPrefix: io.github.androidpoet
  deploymentTarget:
    iOS: "17.2"
settings:
  base:
    CODE_SIGNING_ALLOWED: "NO"
    DEVELOPMENT_TEAM: ""
    FRAMEWORK_SEARCH_PATHS:
      - "$(SRCROOT)/../sampleApp/build/bin/iosSimulatorArm64/debugFramework"
    LD_RUNPATH_SEARCH_PATHS:
      - "$(inherited)"
      - "@executable_path/Frameworks"
targets:
  LiquidKitSampleIOS:
    type: application
    platform: iOS
    sources:
      - LiquidKitSample
    dependencies:
      - framework: ../sampleApp/build/bin/iosSimulatorArm64/debugFramework/LiquidKitSample.framework
    preBuildScripts:
      - name: Build Kotlin Framework
        basedOnDependencyAnalysis: false
        script: |
          cd "$SRCROOT/.."
          gradle :sampleApp:linkDebugFrameworkIosSimulatorArm64
    settings:
      base:
        PRODUCT_NAME: LiquidKitSampleIOS
        PRODUCT_MODULE_NAME: LiquidKitSampleIOS
        PRODUCT_BUNDLE_IDENTIFIER: io.github.androidpoet.LiquidKitSample
        INFOPLIST_FILE: LiquidKitSample/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1,2"
        SWIFT_VERSION: "6.0"
        SWIFT_ENABLE_EXPLICIT_MODULES: "NO"
        "EXCLUDED_ARCHS[sdk=iphonesimulator*]": "x86_64"
