name: Publish

on:
  release:
    types: [released]
  workflow_dispatch:

jobs:
  publish:
    name: Validate release publication
    runs-on: macos-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 17

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build library publications
        run: ./gradlew :liquidkit:publishAllPublicationsToLocalBuildRepository --stacktrace
