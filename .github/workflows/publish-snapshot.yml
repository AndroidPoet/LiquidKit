name: Publish Snapshot

on:
  workflow_dispatch:

concurrency:
  group: publish-snapshot-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish-snapshot:
    name: Validate snapshot publication
    runs-on: macos-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 17

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Publish to local Maven repository
        run: ./gradlew :liquidkit:publishToMavenLocal :liquidkit-navigation3:publishToMavenLocal --stacktrace
